<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Live EN &rarr; VI Translator</title>
  <style>
    :root {
      --bg: #0f1115;
      --panel: #181b22;
      --border: #262b35;
      --en: #9ecbff;
      --vi: #ffe08a;
      --muted: #7a8190;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: #e6e9ef;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 16px;
    }
    header h1 { font-size: 16px; margin: 0; font-weight: 600; }
    button {
      background: #2563eb;
      color: #fff;
      border: 0;
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
    }
    button.stop { background: #dc2626; }
    button:disabled { opacity: .5; cursor: default; }
    #status { color: var(--muted); font-size: 13px; }
    #status.live { color: #34d399; }
    #transcript {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .item {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
    }
    .en { color: var(--en); font-size: 15px; line-height: 1.4; }
    .vi { color: var(--vi); font-size: 17px; font-weight: 600; line-height: 1.45; margin-top: 6px; }
    .hint { color: var(--muted); font-size: 13px; max-width: 640px; line-height: 1.5; }
  </style>
</head>
<body>
  <header>
    <h1>Live EN &rarr; VI Translator</h1>
    <button id="startBtn">Bat dau (chon man hinh)</button>
    <button id="stopBtn" class="stop" disabled>Dung</button>
    <span id="status">Chua chay</span>
  </header>

  <div id="transcript">
    <p class="hint">
      Bam <b>Bat dau</b> &rarr; chon tab / man hinh muon nghe &rarr; nho <b>tick "Share tab/system audio"</b>
      trong hop thoai chia se. Moi am thanh tieng Anh phat ra se duoc dich sang tieng Viet o day.
    </p>
  </div>

  <script src="app.js"></script>
</body>
</html>
